{% extends "admin/layout_form.html" %}

{% block title %}{{ 'Rediger Opgave' if maintenance else 'Ny Opgave' }}{% endblock %}

{% block admin_title %}
{{ '✏️ Rediger Opgave' if maintenance else '➕ Ny Opgave' }}
{% endblock %}

{% block admin_content %}

<form method="POST"
    action="{{ url_for('admin.maintenance_edit', id=maintenance.id) if maintenance else url_for('admin.maintenance_new') }}"
    class="flex-col gap-1">

    <!-- Task Name -->
    <div>
        <label for="maintenance_type" class="mb-1" style="display: block; font-weight: bold;">Opgave Navn
            <span style="color: red;">*</span></label>
        <input type="text" id="maintenance_type" name="maintenance_type" required
            value="{{ maintenance.maintenance_type if maintenance else '' }}" placeholder="f.eks. Olieskift"
            class="form-control">
    </div>

    <!-- Interval Time -->
    <div>
        <label for="interval_h" class="mb-1" style="display: block; font-weight: bold;">Driftstimer
            mellem udførsel<span style="color: red;">*</span></label>
        <input type="number" id="interval_h" name="interval_h" step="0.1" min="0" required
            value="{{ maintenance.interval_h if maintenance else '' }}" placeholder="f.eks. 15" class="form-control">
    </div>

    <!-- Actions -->
    <div class="utility-actions relative z-1" style="margin-top: 1rem;">
        <a href="{{ url_for('admin.maintenance_list') }}" class="flex-1" style="text-decoration: none;">
            <button type="button" class="action-btn clear-btn h-full w-full">Annuller</button>
        </a>
        <button type="submit" class="action-btn submit-btn h-full flex-2">Gem</button>
    </div>
</form>
{% endblock %}
