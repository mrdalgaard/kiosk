{% extends "base.html" %}

{% block head %}
{% block admin_head %}{% endblock %}
{% endblock %}

{% block content %}
<div class="app-container justify-center">
    <div class="panel" style="{% block panel_style %}flex: 1; width: 100%;{% endblock %}">

        {% block watermark %}{% endblock %}

        <div class="brand-header border-b-2 border-var-border-color relative z-1">
            <h1 class="text-var-brand-color m-0">
                {% block admin_title %}{% endblock %}
            </h1>
        </div>

        {% block admin_content %}{% endblock %}
    </div>
</div>
{% block admin_scripts %}{% endblock %}
{% endblock %}
