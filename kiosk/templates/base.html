<!DOCTYPE html>
<html lang="da" translate="no">

<head>
    <title>{% block title %}AASvK Kantine{% endblock %}</title>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='app.css') }}">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container"
        style="position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; width: 90%; max-width: 500px;">
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var messages = {{ messages | tojson
        }};
        messages.forEach(function (m) {
            showToast(m[1], m[0]);
        });
        });
    </script>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}

    <script>
        function showToast(message, category) {
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            var isError = (category === 'error' || category === 'danger');
            toast.style.cssText = 'pointer-events: auto; padding: 1.5rem 2rem; border-radius: 12px; font-size: 1.5rem; font-weight: 600; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15); animation: toastSlideIn 0.4s ease; cursor: pointer;'
                + (isError
                    ? 'background: #fef2f2; color: #991b1b; border: 2px solid #fecaca;'
                    : 'background: #f0fdf4; color: #166534; border: 2px solid #bbf7d0;');
            toast.textContent = message;
            toast.onclick = function () { dismissToast(toast); };
            container.appendChild(toast);
            setTimeout(function () { dismissToast(toast); }, 8000);
        }

        function dismissToast(toast) {
            if (toast.dataset.dismissed) return;
            toast.dataset.dismissed = 'true';
            toast.style.animation = 'toastSlideOut 0.4s ease forwards';
            setTimeout(function () { toast.remove(); }, 400);
        }
    </script>

    <style>
        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateY(-1rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-1rem);
            }
        }
    </style>
</body>

</html>
