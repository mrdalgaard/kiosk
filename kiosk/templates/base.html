<!DOCTYPE html>
<html lang="da" translate="no">

<head>
    <title>{% block title %}AASvK Kantine{% endblock %}</title>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='app.css') }}">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    {% block head %}{% endblock %}

    <!-- Dynamic REM Scaling for 1:1 pixel-wise linear scaling -->
    <script>
        (function () {
            function updateFontSize() {
                // Reference dimensions (1024x768 is our 16px baseline)
                var BASE_WIDTH = 1024;
                var BASE_HEIGHT = 820; // Increased to account for the full height of the panels including buttons

                var widthScale = window.innerWidth / BASE_WIDTH;
                var heightScale = window.innerHeight / BASE_HEIGHT;

                // Select the most restrictive scale to ensure nothing is clipped
                var scale = Math.min(widthScale, heightScale);

                // Set the root font size proportionally (baseline 16px)
                document.documentElement.style.fontSize = (scale * 16) + 'px';
            }

            window.addEventListener('resize', updateFontSize);
            updateFontSize();
        })();
    </script>
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container"></div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var messages = {{ messages | tojson
        }};
        messages.forEach(function (m) {
            showToast(m[1], m[0]);
        });
        });
    </script>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}

    <script>
        function showToast(message, category) {
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            var isError = (category === 'error' || category === 'danger');

            toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
            toast.textContent = message;
            toast.onclick = function () { dismissToast(toast); };

            container.appendChild(toast);
            setTimeout(function () { dismissToast(toast); }, 8000);
        }

        function dismissToast(toast) {
            if (toast.dataset.dismissed) return;
            toast.dataset.dismissed = 'true';
            toast.style.animation = 'toastSlideOut 0.4s ease forwards';
            setTimeout(function () { toast.remove(); }, 400);
        }
    </script>


    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/service-worker.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

    <script>
        /* Prevent touch-hold context menu on Android PWA */
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
        document.addEventListener('selectstart', function (e) { e.preventDefault(); });

        /* Convert touch-hold into a regular click on release (not while holding) */
        (function () {
            var LONG_PRESS_MS = 550; // just above Android's ~500ms long-press threshold
            var longPressTimer = null;
            var longPressTarget = null;
            var isLongPress = false;

            document.addEventListener('touchstart', function (e) {
                longPressTarget = e.target;
                isLongPress = false;
                longPressTimer = setTimeout(function () {
                    isLongPress = true; // flag only — click fires on touchend
                }, LONG_PRESS_MS);
            }, { passive: true });

            document.addEventListener('touchend', function (e) {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                if (isLongPress && longPressTarget) {
                    // Fire click on release, replicating a normal tap
                    longPressTarget.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
                }
                isLongPress = false;
                longPressTarget = null;
            }, { passive: true });

            document.addEventListener('touchmove', function () {
                if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                isLongPress = false;
            }, { passive: true });

            document.addEventListener('touchcancel', function () {
                if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                isLongPress = false;
            }, { passive: true });
        })();

    </script>
</body>

</html>
